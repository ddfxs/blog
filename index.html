<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到我的硬核主页</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-section {
            padding: 20px 0 40px 0;
            border-bottom: 1px dashed rgba(128, 128, 128, 0.3);
            margin-bottom: 30px;
        }
        .profile-avatar {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .bio {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
        }
        @media (prefers-color-scheme: dark) {
            .bio { color: #aaa; }
        }
        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 10px 0;
            border-bottom: 1px solid rgba(128, 128, 128, 0.1);
        }
        .post-link {
            font-size: 17px;
            font-weight: 500;
        }
        .post-date {
            font-size: 14px;
            color: #888;
            font-family: monospace;
            white-space: nowrap;
            margin-left: 15px;
        }
        .tag-badge {
            font-size: 11px;
            background: rgba(128, 128, 128, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            color: var(--text-color);
        }
    </style>
</head>
<body>

    <!-- 动态页头导航，由 js/main.js 统一加载 -->
    <header id="global-header"></header>

    <main class="container">
        <!-- 自我介绍区块 -->
        <section class="profile-section">
            <div class="profile-avatar">👨‍💻</div>
            <h1>你好，我是博主</h1>
            <p class="bio">
                这里是我的个人精神角落。拒绝一切花哨的构建工具（Webpack/Vite）和臃肿的框架，纯手写 HTML/CSS/JS。用最古老、最硬核的方式，记录技术、生活与思考。
            </p>
        </section>

        <!-- 文章列表区块 -->
        <section>
            <h2>✍️ 最近归档</h2>
            <div id="posts-list" style="margin-top: 15px;">
                <p style="color: #888;">文章加载中...</p>
            </div>
        </section>
    </main>

    <!-- 动态页脚，由 js/main.js 统一加载 -->
    <footer id="global-footer"></footer>

    <script src="js/main.js"></script>
    <script>
        // 核心逻辑：用原生 Fetch 异步读取并渲染 json 数据
        document.addEventListener("DOMContentLoaded", () => {
            const listContainer = document.getElementById("posts-list");
            
            fetch('data/archive.json')
                .then(response => {
                    if (!response.ok) throw new Error('网络异常，无法加载文章列表');
                    return response.json();
                })
                .then(data => {
                    if (!data.articles || data.articles.length === 0) {
                        listContainer.innerHTML = '<p style="color: #888;">暂无发布文章</p>';
                        return;
                    }
                    
                    listContainer.innerHTML = ''; // 清空加载提示
                    
                    // 循环生成文章列表 HTML
                    data.articles.forEach(article => {
                        const item = document.createElement('div');
                        item.className = 'post-item';
                        
                        // 生成标签 HTML
                        const tagsHtml = article.tags ? article.tags.map(t => `<span class="tag-badge">${t}</span>`).join('') : '';
                        
                        item.innerHTML = `
                            <div>
                                <a href="${article.path}" class="post-link">${article.title}</a>
                                ${tagsHtml}
                            </div>
                            <span class="post-date">${article.date}</span>
                        `;
                        listContainer.appendChild(item);
                    });
                })
                .catch(err => {
                    listContainer.innerHTML = `<p style="color: #ef4444;">❌ 列表加载失败: ${err.message}</p>`;
                });
        });
    </script>
</body>
