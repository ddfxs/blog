<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/">我的博客</a></h1>
            <nav>
                <a href="/">首页</a>
                <a href="archive.html">归档</a>
            </nav>
        </header>

        <main>
            <div id="posts-list"></div>
        </main>

        <footer>
            <p>© 2026 我的博客</p>
        </footer>
    </div>

    <script src="blog.js"></script>
    <script>
        // 加载文章列表
        async function loadPosts() {
            try {
                const response = await fetch('posts/posts-index.js');
                const posts = await response.json();
                renderPosts(posts);
            } catch (error) {
                console.error('加载文章失败:', error);
                document.getElementById('posts-list').innerHTML = '<p>加载文章失败</p>';
            }
        }

        function renderPosts(posts) {
            const container = document.getElementById('posts-list');
            container.innerHTML = '';
            
            posts.forEach(post => {
                const postEl = document.createElement('article');
                postEl.className = 'post-item';
                postEl.innerHTML = `
                    <h2><a href="post.html?slug=${post.slug}">${post.title}</a></h2>
                    <div class="post-meta">
                        <time>${post.date}</time>
                        ${post.category ? `<span class="category">${post.category}</span>` : ''}
                    </div>
                    ${post.excerpt ? `<p class="excerpt">${post.excerpt}</p>` : ''}
                `;
                container.appendChild(postEl);
            });
        }

        loadPosts();
    </script>
</body>
</html>
